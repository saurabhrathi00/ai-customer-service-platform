# Production docker-compose for the AI Customer Service Platform.
#
# Secrets layout on the host (NOT in this repo):
#   /etc/secrets/auth-service/secrets.properties
#   /etc/secrets/user-business-service/secrets.properties
#   /etc/secrets/knowledge-service/secrets.properties
#   /etc/secrets/incoming-call-service/secrets.properties
#   /etc/secrets/call-orchestration-service/secrets.properties
#   /etc/secrets/ai-conversation-service/secrets.properties
#
# Each is mounted read-only into the container at /etc/secrets/secrets.properties.
# Non-sensitive configs are baked into each image at /app/configs/.
#
# Public-facing host environment (or .env file next to this compose file):
#   PUBLIC_HOST=my-domain.in
#   ACME_EMAIL=ops@my-domain.in
#   CONFIGS_CALLORCHESTRATION_WSBASEURL=wss://my-domain.in/call-orchestration-service
#
# Only Caddy publishes :80/:443 to the public IP. App service ports are
# bound to 127.0.0.1 so they remain reachable for local debugging on the
# host but are NOT exposed to the public internet.

name: ai-customer-service

networks:
  backend:
    driver: bridge

volumes:
  caddy_data:       # persistent Let's Encrypt certs + ACME state
  caddy_config:

services:

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    # Only started when the `production` profile is active:
    #   docker compose --profile production up
    # Local dev (`docker compose -f docker-compose.yml -f docker-compose.local.yml up`)
    # skips Caddy because localhost can't get a Let's Encrypt cert.
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?set PUBLIC_HOST (e.g. my-domain.in)}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend
    depends_on:
      auth-service:
        condition: service_healthy
      user-business-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      incoming-call-service:
        condition: service_healthy
      call-orchestration-service:
        condition: service_healthy

  auth-service:
    build:
      context: ./auth-service
    image: ai-customer-service/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - /etc/secrets/auth-service/secrets.properties:/etc/secrets/secrets.properties:ro
    networks:
      - backend

  user-business-service:
    build:
      context: ./user-business-service
    image: ai-customer-service/user-business-service:latest
    container_name: user-business-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - /etc/secrets/user-business-service/secrets.properties:/etc/secrets/secrets.properties:ro
    networks:
      - backend
    depends_on:
      auth-service:
        condition: service_healthy

  knowledge-service:
    build:
      context: ./knowledge-service
    image: ai-customer-service/knowledge-service:latest
    container_name: knowledge-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:8083"
    environment:
      CONFIGS_AUTHSERVICE_BASEURL: http://auth-service:8081/auth-service
      CONFIGS_USERBUSINESSSERVICE_BASEURL: http://user-business-service:8082/user-business-service
    volumes:
      - /etc/secrets/knowledge-service/secrets.properties:/etc/secrets/secrets.properties:ro
    networks:
      - backend
    depends_on:
      auth-service:
        condition: service_healthy
      user-business-service:
        condition: service_healthy

  ai-conversation-service:
    build:
      context: ./ai-conversation-service
    image: ai-customer-service/ai-conversation-service:latest
    container_name: ai-conversation-service
    restart: unless-stopped
    # No public exposure: only call-orchestration-service talks to this,
    # over the internal backend network. Bind to loopback for host debug only.
    ports:
      - "127.0.0.1:8087:8087"
    environment:
      CONFIGS_AUTHSERVICE_BASEURL: http://auth-service:8081/auth-service
    volumes:
      - /etc/secrets/ai-conversation-service/secrets.properties:/etc/secrets/secrets.properties:ro
    networks:
      - backend
    depends_on:
      auth-service:
        condition: service_healthy

  call-orchestration-service:
    build:
      context: ./call-orchestration-service
    image: ai-customer-service/call-orchestration-service:latest
    container_name: call-orchestration-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      CONFIGS_AUTHSERVICE_BASEURL: http://auth-service:8081/auth-service
      CONFIGS_USERBUSINESSSERVICE_BASEURL: http://user-business-service:8082/user-business-service
      CONFIGS_KNOWLEDGESERVICE_BASEURL: http://knowledge-service:8083/knowledge-service
      CONFIGS_AICONVERSATIONSERVICE_BASEURL: http://ai-conversation-service:8087/ai-conversation-service
      CONFIGS_AICONVERSATIONSERVICE_WSBASEURL: ws://ai-conversation-service:8087/ai-conversation-service/ws/conversation
    volumes:
      - /etc/secrets/call-orchestration-service/secrets.properties:/etc/secrets/secrets.properties:ro
    networks:
      - backend
    depends_on:
      auth-service:
        condition: service_healthy
      user-business-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      ai-conversation-service:
        condition: service_healthy

  incoming-call-service:
    build:
      context: ./incoming-call-service
    image: ai-customer-service/incoming-call-service:latest
    container_name: incoming-call-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8085"
    environment:
      CONFIGS_AUTHSERVICE_BASEURL: http://auth-service:8081/auth-service
      CONFIGS_USERBUSINESSSERVICE_BASEURL: http://user-business-service:8082/user-business-service
      # Public wss:// URL Twilio will dial. MUST be set on the host —
      # the default in configs/service.properties is a CHANGE_ME placeholder.
      CONFIGS_CALLORCHESTRATION_WSBASEURL: ${CONFIGS_CALLORCHESTRATION_WSBASEURL:?set the public wss URL for call-orchestration-service}
    volumes:
      - /etc/secrets/incoming-call-service/secrets.properties:/etc/secrets/secrets.properties:ro
    networks:
      - backend
    depends_on:
      auth-service:
        condition: service_healthy
      user-business-service:
        condition: service_healthy
