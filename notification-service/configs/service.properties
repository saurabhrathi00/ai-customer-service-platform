# =========================
# Downstream service endpoints (local-dev defaults; overridden in prod via env)
# =========================
configs.authService.baseUrl=${CONFIGS_AUTHSERVICE_BASEURL:http://localhost:8081/auth-service}
configs.userBusinessService.baseUrl=${CONFIGS_USERBUSINESSSERVICE_BASEURL:http://localhost:8082/user-business-service}

# =========================
# Meta WhatsApp Cloud API
# =========================
# stubMode=true short-circuits the HTTP send. Use for local dev when you
# don't have a Meta WhatsApp Business Account wired up yet — the dispatcher
# logs the payload it WOULD send and the rest of the pipeline runs normally.
configs.whatsapp.stubMode=${CONFIGS_WHATSAPP_STUBMODE:true}
configs.whatsapp.graphApiBaseUrl=${CONFIGS_WHATSAPP_BASEURL:https://graph.facebook.com/v21.0}
configs.whatsapp.phoneNumberId=${CONFIGS_WHATSAPP_PHONENUMBERID:}
# Template names — must match the names registered + approved on Meta.
configs.whatsapp.ownerNewLeadTemplate=${CONFIGS_WHATSAPP_OWNER_TEMPLATE:lead_new_notification}
configs.whatsapp.customerApptConfirmedTemplate=${CONFIGS_WHATSAPP_CUST_CONFIRM_TEMPLATE:customer_appt_confirmed}
configs.whatsapp.customerApptDeclinedTemplate=${CONFIGS_WHATSAPP_CUST_DECLINE_TEMPLATE:customer_appt_declined}
configs.whatsapp.customerAgentWillConnectTemplate=${CONFIGS_WHATSAPP_CUST_CONNECT_TEMPLATE:customer_agent_will_connect}
configs.whatsapp.templateLanguage=${CONFIGS_WHATSAPP_TEMPLATE_LANG:en}

# =========================
# Dashboard deep-link
# =========================
# The owner-new-lead template's CTA URL button has a static base prefix; the
# scheduler appends the leadId via the WhatsApp template's button parameter.
configs.dashboard.leadLinkTemplate=${CONFIGS_DASHBOARD_LEAD_LINK:http://localhost:5173/leads/}

# =========================
# Scheduler
# =========================
# Default: every minute. Use Spring 6-field cron syntax (sec min hr dom mon dow).
configs.scheduler.cron=${CONFIGS_SCHEDULER_CRON:0 * * * * *}
