spring.application.name=notification-service
server.servlet.context-path=/notification-service/
# 8090 keeps us clear of the other services. Update Caddy + auth policy to match.
server.port=8090

# External property sources (configs in repo + secrets mounted at runtime).
spring.config.import=optional:file:./configs/service.properties,optional:file:./secrets/secrets.properties,optional:file:/app/configs/service.properties,optional:file:/etc/secrets/secrets.properties

spring.main.web-application-type=servlet

# We own no tables; disable JPA auto-config so Spring Boot doesn't try to wire
# a DataSource at startup just because something in the classpath looks like it.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
