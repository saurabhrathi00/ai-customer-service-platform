spring.application.name=knowledge-service
server.servlet.context-path=/knowledge-service/
server.port=8083

# External property sources
spring.config.import=optional:file:./configs/service.properties,optional:file:./secrets/secrets.properties

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=knowledge

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=knowledge
spring.flyway.default-schema=knowledge
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
