# =========================
# Database Configuration
# =========================
configs.businessDb.name=postgres
configs.businessDb.schema=knowledge
configs.businessDb.url=${BUSINESS_DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/}

# Pool tuning — under Supabase pooler idle timeout
configs.businessDb.pool.maximumPoolSize=5
configs.businessDb.pool.minimumIdle=1
configs.businessDb.pool.maxLifetimeMs=540000
configs.businessDb.pool.idleTimeoutMs=300000
configs.businessDb.pool.keepaliveTimeMs=240000
configs.businessDb.pool.connectionTestQuery=SELECT 1

# Downstream services. Defaults work for local dev; in production the
# CONFIGS_*_BASEURL env vars (set by docker-compose / host) point to the
# real container/service hostnames.
configs.authService.baseUrl=${CONFIGS_AUTHSERVICE_BASEURL:http://localhost:8081/auth-service}
configs.userBusinessService.baseUrl=${CONFIGS_USERBUSINESSSERVICE_BASEURL:http://localhost:8082/user-business-service}

# Cache
configs.cache.rendered.ttlMinutes=10
configs.cache.rendered.maxEntries=10000
