spring.application.name=conversation-summary-service
server.servlet.context-path=/conversation-summary-service/
server.port=8089

# External property sources.
spring.config.import=optional:file:./configs/service.properties,optional:file:./secrets/secrets.properties,optional:file:/app/configs/service.properties,optional:file:/etc/secrets/secrets.properties

spring.main.web-application-type=servlet

# JPA — we don't OWN the call_logs table, but we OWN call_summaries (separate schema).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=summary
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway migrations live under db/migration. Default schema is "summary".
spring.flyway.enabled=true
spring.flyway.default-schema=summary
spring.flyway.schemas=summary
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration
