spring.application.name=auth-service
server.servlet.context-path=/auth-service/
server.port=8081

# External property sources (configs + secrets)
spring.config.import=optional:file:./configs/service.properties,optional:file:./secrets/secrets.properties

# JPA — read-only access to user-business-service's businesses table
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=business
