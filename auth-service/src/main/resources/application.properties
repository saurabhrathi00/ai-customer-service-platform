spring.application.name=auth-service
server.servlet.context-path=/auth-service/
server.port=8081

# External property sources (configs + secrets).
# Local dev uses ./configs and ./secrets; production uses image-baked configs at
# /app/configs and a secrets file mounted at /etc/secrets — see Dockerfile.
spring.config.import=optional:file:./configs/service.properties,optional:file:./secrets/secrets.properties,optional:file:/app/configs/service.properties,optional:file:/etc/secrets/secrets.properties

# JPA — read-only access to user-business-service's businesses table
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=business
