# Shared DB — points at the same business DB user-business-service uses.
configs.businessDb.name=postgres
configs.businessDb.schema=business
configs.businessDb.url=${BUSINESS_DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/}

# Hikari connection pool sizing. Supabase session-mode pooler (port 5432) caps
# total clients at 15 shared across all services on the same DB user.
configs.businessDb.pool.maximumPoolSize=3
configs.businessDb.pool.minimumIdle=1
# Recycle/keep connections under the DB-side idle timeout (Supabase: ~10 min).
# Tune these to whatever the target DB pooler enforces.
configs.businessDb.pool.maxLifetimeMs=540000
configs.businessDb.pool.idleTimeoutMs=300000
configs.businessDb.pool.keepaliveTimeMs=240000
# connectionTestQuery removed on purpose. Modern HikariCP uses the faster
# JDBC4 Connection.isValid() check by default; setting a custom test query
# disables that fast path. Leave unset.

# =========================
# Service-to-Service Policy
# =========================
configs.auth.enabled=true
# Scopes the auth-service may issue, keyed by the requested audience (target service).
# user-business-service hosts the internal lead endpoints (created by
# summary-service, polled + decided-via-WhatsApp by notification-service), so
# this audience must allow the leads.internal.* scopes too.
configs.auth.policy.services.user-business-service.scopes=business.internal.read,business.internal.write,leads.internal.read,leads.internal.write
configs.auth.policy.services.knowledge-service.scopes=knowledge.internal.read
configs.auth.policy.services.ai-conversation-service.scopes=ai.internal.invoke
configs.auth.policy.services.conversation-summary-service.scopes=summary.internal.invoke
configs.auth.policy.services.notification-service.scopes=notify.internal.invoke
configs.auth.policy.services.call-orchestration-service.scopes=calls.internal.read,calls.internal.write
