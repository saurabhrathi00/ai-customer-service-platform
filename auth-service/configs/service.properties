# Shared DB — points at the same business DB user-business-service uses.
configs.businessDb.name=postgres
configs.businessDb.schema=business
configs.businessDb.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/

# Hikari connection pool sizing. Supabase session-mode pooler (port 5432) caps
# total clients at 15 shared across all services on the same DB user.
configs.businessDb.pool.maximumPoolSize=3
configs.businessDb.pool.minimumIdle=1
# Recycle/keep connections under the DB-side idle timeout (Supabase: ~10 min).
# Tune these to whatever the target DB pooler enforces.
configs.businessDb.pool.maxLifetimeMs=540000
configs.businessDb.pool.idleTimeoutMs=300000
configs.businessDb.pool.keepaliveTimeMs=240000
configs.businessDb.pool.connectionTestQuery=SELECT 1

# =========================
# Service-to-Service Policy
# =========================
configs.auth.enabled=true
# Who may call user-business-service internal endpoints
configs.auth.policy.services.user-business-service.scopes=business.internal.read
