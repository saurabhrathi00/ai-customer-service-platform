# =========================
# Database Configuration
# =========================
configs.businessDb.name=postgres
configs.businessDb.schema=calls
configs.businessDb.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/
configs.businessDb.pool.maximumPoolSize=5
configs.businessDb.pool.minimumIdle=1
configs.businessDb.pool.maxLifetimeMs=540000
configs.businessDb.pool.idleTimeoutMs=300000
configs.businessDb.pool.keepaliveTimeMs=240000
configs.businessDb.pool.connectionTestQuery=SELECT 1

# =========================
# Downstream service endpoints
# =========================
configs.authService.baseUrl=http://localhost:8081/auth-service
configs.userBusinessService.baseUrl=http://localhost:8082/user-business-service
configs.knowledgeService.baseUrl=http://localhost:8083/knowledge-service
configs.aiConversationService.baseUrl=http://localhost:8087/ai-conversation-service
configs.aiConversationService.wsBaseUrl=ws://localhost:8087/ai-conversation-service/ws/conversation
configs.aiConversationService.provider=gemini
configs.aiConversationService.connectTimeoutMs=5000
configs.aiConversationService.sendTimeoutMs=2000
configs.conversationSummaryService.baseUrl=http://localhost:8089/conversation-summary-service
configs.notificationService.baseUrl=http://localhost:8090/notification-service

# =========================
# STT / TTS providers
# =========================
configs.stt.provider=elevenlabs
configs.stt.confidenceThreshold=0.7
configs.stt.muteWhileBotSpeaking=true
configs.tts.provider=elevenlabs

# =========================
# ElevenLabs endpoints
# =========================
configs.elevenlabs.sttWsUrl=wss://api.elevenlabs.io/v1/speech-to-text/realtime
configs.elevenlabs.sttModelId=scribe_v2_realtime
configs.elevenlabs.sttLanguageCode=hi
configs.elevenlabs.sttIncludeLanguageDetection=false
configs.elevenlabs.sttCommitStrategy=vad
configs.elevenlabs.sttNoVerbatim=true

# TTS (text -> mu-law 8kHz for Twilio Media Streams)
configs.elevenlabs.ttsBaseUrl=https://api.elevenlabs.io
configs.elevenlabs.ttsVoiceId=1Z7Y8o9cvUeWq8oLKgMY
configs.elevenlabs.ttsModelId=eleven_turbo_v2_5
configs.elevenlabs.ttsOutputFormat=ulaw_8000
configs.elevenlabs.ttsStability=0.35
configs.elevenlabs.ttsSimilarityBoost=0.82
configs.elevenlabs.ttsStyle=0.15
configs.elevenlabs.ttsUseSpeakerBoost=true