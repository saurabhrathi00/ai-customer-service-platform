# =========================
# Database Configuration
# =========================
configs.businessDb.name=postgres
configs.businessDb.schema=calls
configs.businessDb.url=${BUSINESS_DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/}
configs.businessDb.pool.maximumPoolSize=5
configs.businessDb.pool.minimumIdle=1
configs.businessDb.pool.maxLifetimeMs=540000
configs.businessDb.pool.idleTimeoutMs=300000
configs.businessDb.pool.keepaliveTimeMs=240000
# connectionTestQuery removed on purpose — HikariCP's JDBC4 isValid() is faster.

# =========================
# Downstream service endpoints
# =========================
# Defaults are for local dev. Production overrides via CONFIGS_*_BASEURL env
# vars set by docker-compose / the host.
configs.authService.baseUrl=${CONFIGS_AUTHSERVICE_BASEURL:http://localhost:8081/auth-service}
configs.userBusinessService.baseUrl=${CONFIGS_USERBUSINESSSERVICE_BASEURL:http://localhost:8082/user-business-service}
configs.knowledgeService.baseUrl=${CONFIGS_KNOWLEDGESERVICE_BASEURL:http://localhost:8083/knowledge-service}
configs.aiConversationService.baseUrl=${CONFIGS_AICONVERSATIONSERVICE_BASEURL:http://localhost:8087/ai-conversation-service}
configs.aiConversationService.wsBaseUrl=${CONFIGS_AICONVERSATIONSERVICE_WSBASEURL:ws://localhost:8087/ai-conversation-service/ws/conversation}
configs.aiConversationService.provider=gemini
configs.aiConversationService.connectTimeoutMs=5000
configs.aiConversationService.sendTimeoutMs=2000
configs.conversationSummaryService.baseUrl=${CONFIGS_CONVERSATIONSUMMARYSERVICE_BASEURL:http://localhost:8089/conversation-summary-service}
configs.notificationService.baseUrl=${CONFIGS_NOTIFICATIONSERVICE_BASEURL:http://localhost:8090/notification-service}

# =========================
# STT / TTS providers
# =========================
configs.stt.provider=elevenlabs
configs.stt.confidenceThreshold=0.65
configs.stt.transliterateDevanagari=true

# =========================
# Thinking-filler audio
# =========================
# When enabled, plays one of a small set of pre-synthesised "ek sec / one
# moment" clips immediately on each customer utterance to mask LLM+TTS
# round-trip latency. Set to false to disable entirely (no pre-synthesis,
# no playback). Language is matched to the caller's words: a Hindi caller
# never hears the English clip and vice versa.
configs.filler.enabled=false
configs.filler.minGapMs=8000
# Small natural pause between caller-stops-talking and filler starting —
# without this the bot jumps in instantly, which sounds eager/robotic.
configs.filler.startDelayMs=500
# Longer phrases sound far more natural — ElevenLabs needs prosodic context
# to flow. 4-8 words is the sweet spot: noticeably "thinking out loud" but
# not so long it delays the real reply.
configs.filler.phrasesEn[0]=Hmm, let me just check that for you.
configs.filler.phrasesEn[1]=Sure, one moment please.
configs.filler.phrasesEn[2]=Okay, let me see what I can find.
configs.filler.phrasesEn[3]=Right, just a second.
configs.filler.phrasesHi[0]=Haan ji, ek minute, main dekhta hoon.
configs.filler.phrasesHi[1]=Theek hai, ek second ruko, main check karta hoon.
configs.filler.phrasesHi[2]=Achha, ek minute, dekhta hoon aapke liye.
configs.filler.phrasesHi[3]=Haan, ek sec, main confirm karta hoon.
# Short single-token acknowledgements played when caller's utterance is a
# STATEMENT, not a question. Universally valid filler — "ok / hmm / achha"
# fit anything they could say. Long ack phrases ("got it, noted") felt
# scripted on the 3rd reuse.
configs.filler.ackPhrasesEn[0]=Okay.
configs.filler.ackPhrasesEn[1]=Hmm.
configs.filler.ackPhrasesEn[2]=Right.
configs.filler.ackPhrasesEn[3]=Sure.
configs.filler.ackPhrasesHi[0]=Achha.
configs.filler.ackPhrasesHi[1]=Hmm.
configs.filler.ackPhrasesHi[2]=Theek.
configs.filler.ackPhrasesHi[3]=Haan ji.

# =========================
# Silence watchdog
# =========================
# Periodically checks how long the caller has been silent (bot-speaking
# time excluded). After nudgeAfterMs of dead air, plays an "are you there?"
# prompt. If they stay silent for another hangupAfterNudgeMs, ends the
# call with a polite farewell. Flip enabled=false to disable entirely.
configs.silence.enabled=true
configs.silence.nudgeAfterMs=20000
configs.silence.hangupAfterNudgeMs=18000
configs.silence.checkIntervalMs=2000
configs.silence.nudgeTextEn=Hello, are you still there?
configs.silence.nudgeTextHi=Hello, kya aap line par hain?
configs.silence.farewellTextEn=It seems the line went quiet. I'll end the call now. Have a great day!
configs.silence.farewellTextHi=Lagta hai line saaf nahi hai. Main call abhi end kar raha hoon. Aapka din shubh ho!
configs.tts.provider=elevenlabs

# =========================
# Barge-in (caller interrupts bot)
# =========================
# When enabled, STT finals arriving while the bot is speaking trigger an
# interrupt: carrier buffer is flushed, pending TTS is cancelled, and the
# new utterance is forwarded to the LLM. Provider-specific: EnableX uses
# clear_media; Exotel has no flush mechanism so barge-in is disabled there.
configs.bargeIn.enabled=false
configs.bargeIn.minTextLength=4
configs.bargeIn.debounceMs=300
configs.bargeIn.gracePeriodMs=500
configs.bargeIn.remainingAudioThresholdMs=600
configs.bargeIn.maxBufferMs=800
configs.bargeIn.dripIntervalMs=400

# =========================
# EnableX Voice API
# =========================
configs.enablexApi.baseUrl=${CONFIGS_ENABLEXAPI_BASEURL:https://api.enablex.io}

# =========================
# Deepgram (used when configs.stt.provider=deepgram)
# =========================
configs.deepgram.sttModelId=flux-general-en
configs.deepgram.sttEotTimeoutMs=400
# Nova-3 streaming (used when configs.stt.provider=deepgram-nova). multi =
# code-switching English+Hindi+10 more languages. endpointing = silence (ms)
# the server waits before committing a final transcript.
configs.deepgram.novaModelId=nova-3-general
configs.deepgram.novaLanguage=multi
configs.deepgram.novaEndpointingMs=1800

# =========================
# ElevenLabs endpoints
# =========================
configs.elevenlabs.sttWsUrl=wss://api.elevenlabs.io/v1/speech-to-text/realtime
configs.elevenlabs.sttModelId=scribe_v2_realtime
configs.elevenlabs.sttLanguageCode=hi
configs.elevenlabs.sttIncludeLanguageDetection=true
configs.elevenlabs.sttCommitStrategy=vad
# VAD-mode tuning (only used when sttCommitStrategy=vad). 1.0s silence
# threshold = snappier than ElevenLabs' 1.5s default. vad_threshold 0.4 =
# default sensitivity.
configs.elevenlabs.sttVadSilenceThresholdSecs=1.0
configs.elevenlabs.sttVadThreshold=0.5
configs.elevenlabs.sttNoVerbatim=true
# Time of silence (no partial transcript) after which we manually send the
# commit message to ElevenLabs. With commit_strategy=manual the server never
# commits on its own — we drive end-of-turn ourselves for low latency.
configs.elevenlabs.sttManualCommitSilenceMs=900

# TTS (text -> mu-law 8kHz for Twilio Media Streams)
configs.elevenlabs.ttsBaseUrl=https://api.elevenlabs.io
configs.elevenlabs.ttsVoiceId=HBlqQDCBvQxsEK8OFtEZ
configs.elevenlabs.ttsModelId=eleven_flash_v2_5
configs.elevenlabs.ttsOutputFormat=ulaw_8000
configs.elevenlabs.ttsStability=0.65
configs.elevenlabs.ttsSimilarityBoost=0.75
configs.elevenlabs.ttsStyle=0.0
configs.elevenlabs.ttsUseSpeakerBoost=true