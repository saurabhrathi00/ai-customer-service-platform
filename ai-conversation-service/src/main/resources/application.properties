spring.application.name=ai-conversation-service
server.servlet.context-path=/ai-conversation-service/
server.port=8087

# External property sources.
# Local dev uses ./configs and ./secrets; production uses image-baked configs at
# /app/configs and a secrets file mounted at /etc/secrets — see Dockerfile.
spring.config.import=optional:file:./configs/service.properties,optional:file:./secrets/secrets.properties,optional:file:/app/configs/service.properties,optional:file:/etc/secrets/secrets.properties

# WebFlux client only; we use Servlet web + WebClient for streaming
spring.main.web-application-type=servlet

# JPA — we OWN the conversation_histories table under our own schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=ai_conversation
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.default-schema=ai_conversation
spring.flyway.schemas=ai_conversation
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration