# Default is for local dev. Production overrides via CONFIGS_AUTHSERVICE_BASEURL.
configs.authService.baseUrl=${CONFIGS_AUTHSERVICE_BASEURL:http://localhost:8081/auth-service}

# Shared Supabase DB. We own the ai_conversation schema (conversation_histories).
configs.businessDb.name=postgres
configs.businessDb.schema=ai_conversation
configs.businessDb.url=${BUSINESS_DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/}
configs.businessDb.pool.maximumPoolSize=3
configs.businessDb.pool.minimumIdle=1
configs.businessDb.pool.maxLifetimeMs=540000
configs.businessDb.pool.idleTimeoutMs=300000
configs.businessDb.pool.keepaliveTimeMs=240000

# LLM
configs.llm.defaultProvider=gemini
configs.llm.maxOutputTokens=220
configs.llm.temperature=0.2
configs.llm.requestTimeoutSeconds=20
configs.llm.streamingTimeoutSeconds=60
configs.llm.historyWindowTurns=5
configs.llm.promptCacheEnabled=true
configs.llm.stallTimeoutSeconds=10
configs.llm.retryMaxAttempts=2
configs.llm.retryInitialBackoffMs=200

# Sessions
configs.session.idleTimeoutMinutes=30
configs.session.maxConcurrent=500
configs.session.sweepIntervalSeconds=60

# Summary
configs.summary.maxOutputTokens=300
configs.summary.temperature=0.2

# Prompts
# Optional: override the bundled classpath system prompt with an external file.
# Leave blank to use classpath:prompts/system-prompt.txt. Restart required after edit.
configs.prompts.systemPromptPath=