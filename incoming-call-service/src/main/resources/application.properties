spring.application.name=incoming-call-service
server.servlet.context-path=/incoming-call-service/
server.port=8085

# External property sources (configs + secrets)
spring.config.import=optional:file:./configs/service.properties,optional:file:./secrets/secrets.properties

# Respect X-Forwarded-* so the URL used in Twilio signature validation
# matches the public URL Twilio actually called (when behind a proxy/ALB).
server.forward-headers-strategy=native
