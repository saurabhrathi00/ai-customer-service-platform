# =========================
# Downstream service endpoints
# =========================

# Defaults work for local dev; production overrides these via env vars
# (CONFIGS_*_BASEURL) set by docker-compose / the host.
configs.userBusinessService.baseUrl=${CONFIGS_USERBUSINESSSERVICE_BASEURL:http://localhost:8082/user-business-service}
configs.authService.baseUrl=${CONFIGS_AUTHSERVICE_BASEURL:http://localhost:8081/auth-service}

# =========================
# Service-token request (this service -> auth-service)
# =========================

configs.authService.audience=user-business-service
configs.authService.scopes=business.internal.read

# =========================
# Call orchestration (target of TwiML <Stream>)
# =========================
# Twilio dials this URL — it must be publicly reachable from Twilio's network.
# In production set CONFIGS_CALLORCHESTRATION_WSBASEURL to a stable public
# wss:// endpoint (load balancer / ALB / domain). The default below is a
# placeholder and will NOT work in production.
configs.callOrchestration.wsBaseUrl=${CONFIGS_CALLORCHESTRATION_WSBASEURL:wss://CHANGE_ME.example.com/call-orchestration-service}

# =========================
# Twilio pre-roll (spoken before <Connect><Stream>; buys ~3s for backend prep)
# =========================
# =========================
# Business lookup cache (in-memory TTL — same Twilio number repeat calls skip HTTP)
# =========================
configs.businessLookupCache.ttlSeconds=300
configs.businessLookupCache.negativeTtlSeconds=60

configs.twilioPreRoll.enabled=true
configs.twilioPreRoll.text=Please wait while we connect you.
configs.twilioPreRoll.voice=
configs.twilioPreRoll.language=

# =========================
# EnableX Voice API
# =========================
configs.enablexApi.baseUrl=${CONFIGS_ENABLEXAPI_BASEURL:https://api.enablex.io}
