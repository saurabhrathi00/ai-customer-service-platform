# =========================
# Downstream service endpoints
# =========================

configs.userBusinessService.baseUrl=http://localhost:8082/user-business-service
configs.authService.baseUrl=http://localhost:8081/auth-service

# =========================
# Service-token request (this service -> auth-service)
# =========================

configs.authService.audience=user-business-service
configs.authService.scopes=business.internal.read

# =========================
# Call orchestration (target of TwiML <Stream>)
# =========================

configs.callOrchestration.wsBaseUrl=wss://trademarks-attacked-opponents-installed.trycloudflare.com/call-orchestration-service

# =========================
# Twilio pre-roll (spoken before <Connect><Stream>; buys ~3s for backend prep)
# =========================
# =========================
# Business lookup cache (in-memory TTL — same Twilio number repeat calls skip HTTP)
# =========================
configs.businessLookupCache.ttlSeconds=300
configs.businessLookupCache.negativeTtlSeconds=60

configs.twilioPreRoll.enabled=true
configs.twilioPreRoll.text=Please wait while we connect you.
configs.twilioPreRoll.voice=
configs.twilioPreRoll.language=
