spring.application.name=subscription-service
server.servlet.context-path=/subscription-service/
server.port=8091

spring.config.import=optional:file:./configs/service.properties,optional:file:./secrets/secrets.properties,optional:file:/app/configs/service.properties,optional:file:/etc/secrets/secrets.properties

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=subscription

spring.flyway.enabled=true
spring.flyway.schemas=subscription
spring.flyway.default-schema=subscription
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.forward-headers-strategy=native
