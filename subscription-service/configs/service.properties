# =========================
# Database Configuration
# =========================
configs.subscriptionDb.name=postgres
configs.subscriptionDb.schema=subscription
configs.subscriptionDb.url=${SUBSCRIPTION_DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/}
configs.subscriptionDb.pool.maximumPoolSize=3
configs.subscriptionDb.pool.minimumIdle=1
configs.subscriptionDb.pool.maxLifetimeMs=540000
configs.subscriptionDb.pool.idleTimeoutMs=300000
configs.subscriptionDb.pool.keepaliveTimeMs=240000

# =========================
# Downstream service endpoints
# =========================
configs.authService.baseUrl=${CONFIGS_AUTHSERVICE_BASEURL:http://localhost:8081/auth-service}
configs.userBusinessService.baseUrl=${CONFIGS_USERBUSINESSSERVICE_BASEURL:http://localhost:8082/user-business-service}

# =========================
# GST
# =========================
configs.gst.ratePercent=18

# =========================
# Razorpay
# =========================
configs.razorpay.webhookToleranceSeconds=300
